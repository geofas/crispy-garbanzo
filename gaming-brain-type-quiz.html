<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Brain-Type Quiz</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2029;
    --text: #e6e9ef;
    --muted: #8b95a5;
    --accent: #7aa2f7;
    --accent-soft: #2a3548;
    --border: #2a3140;
    --good: #9ece6a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafbfc;
      --card: #ffffff;
      --text: #1a1f2c;
      --muted: #5e6878;
      --accent: #2557d6;
      --accent-soft: #e6efff;
      --border: #e1e5ec;
      --good: #2c8a3e;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    line-height: 1.5;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  header h1 {
    font-size: 1.5rem;
    margin: 0 0 .25rem;
  }
  header p {
    color: var(--muted);
    margin: 0 0 2rem;
    font-size: .95rem;
  }
  .progress {
    height: 4px;
    background: var(--accent-soft);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width .25s ease;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .qmeta {
    color: var(--muted);
    font-size: .85rem;
    margin-bottom: .5rem;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .qtext {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 0 0 1.25rem;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: .5rem;
    margin-bottom: 1.5rem;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: .75rem;
    padding: .85rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
    user-select: none;
  }
  .option:hover {
    border-color: var(--accent);
  }
  .option.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .option input {
    margin: .25rem 0 0;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: .35rem;
  }
  .controls {
    display: flex;
    justify-content: space-between;
    gap: .75rem;
  }
  button {
    font: inherit;
    padding: .65rem 1.25rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
  }
  button:disabled {
    opacity: .4;
    cursor: not-allowed;
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  button.primary:hover:not(:disabled) {
    filter: brightness(1.08);
  }
  .hint {
    color: var(--muted);
    font-size: .85rem;
    margin: -.5rem 0 1rem;
  }
  /* results */
  .scores {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: .5rem 1rem;
    margin: 1.5rem 0;
    align-items: center;
  }
  .score-name { font-weight: 600; }
  .score-name.top { color: var(--good); }
  .score-bar-wrap {
    background: var(--accent-soft);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
  }
  .score-bar.top { background: var(--good); }
  .score-val {
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    font-size: .9rem;
  }
  h2 {
    margin: 2rem 0 .5rem;
    font-size: 1.25rem;
  }
  h3 {
    margin: 1.25rem 0 .35rem;
    font-size: 1.05rem;
    color: var(--accent);
  }
  .archetype-block {
    margin: 1rem 0 1.5rem;
    padding: 1rem 1.25rem;
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 0 8px 8px 0;
  }
  .archetype-block.secondary {
    border-left-color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
  }
  .archetype-name {
    font-weight: 700;
    font-size: 1.1rem;
    margin: 0 0 .35rem;
  }
  .archetype-tag {
    font-size: .8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: .5rem;
  }
  .games {
    font-style: italic;
  }
  .footnote {
    color: var(--muted);
    font-size: .85rem;
    margin-top: 2rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
  .restart {
    margin-top: 2rem;
    text-align: center;
  }
</style>
</head>
<body>
<main id="app"></main>

<script>

const ARCHETYPE_ORDER = ["T", "R", "Y", "E", "N", "P", "S"];

let answers = QUESTIONS.map(() => []); // array of selected option indices per question
let current = 0;
let showResults = false;

const app = document.getElementById("app");

function render() {
  if (showResults) return renderResults();
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const selected = answers[current];
  const progress = ((current) / QUESTIONS.length) * 100;
  app.innerHTML = `
    <header>
      <h1>Gaming Brain-Type Quiz</h1>
      <p>Answer based on what's actually true for you, not what sounds cool.</p>
    </header>
    <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
    <div class="card">
      <div class="qmeta">Question ${current + 1} of ${QUESTIONS.length}</div>
      <h2 class="qtext">${q.text}</h2>
      <div class="hint">Pick one. If two feel equally true, pick both — points split evenly.</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <label class="option ${selected.includes(i) ? "selected" : ""}">
            <input type="checkbox" data-idx="${i}" ${selected.includes(i) ? "checked" : ""}>
            <div><span class="option-letter">${opt.letter})</span>${escape(opt.text)}</div>
          </label>
        `).join("")}
      </div>
      <div class="controls">
        <button id="back" ${current === 0 ? "disabled" : ""}>← Back</button>
        <button id="next" class="primary" ${selected.length === 0 ? "disabled" : ""}>
          ${current === QUESTIONS.length - 1 ? "See result →" : "Next →"}
        </button>
      </div>
    </div>
  `;

  app.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", e => {
      const idx = Number(e.target.dataset.idx);
      const arr = answers[current];
      const pos = arr.indexOf(idx);
      if (pos === -1) arr.push(idx); else arr.splice(pos, 1);
      render();
    });
  });
  app.querySelector("#back").addEventListener("click", () => {
    if (current > 0) { current--; render(); }
  });
  app.querySelector("#next").addEventListener("click", () => {
    if (answers[current].length === 0) return;
    if (current < QUESTIONS.length - 1) {
      current++;
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    } else {
      showResults = true;
      window.scrollTo({ top: 0, behavior: "smooth" });
      render();
    }
  });
}

function computeScores() {
  const scores = Object.fromEntries(ARCHETYPE_ORDER.map(k => [k, 0]));
  answers.forEach((selected, qi) => {
    const q = QUESTIONS[qi];
    const split = selected.length || 1;
    selected.forEach(optIdx => {
      const opt = q.options[optIdx];
      for (const [k, v] of Object.entries(opt.scores)) {
        scores[k] += v / split;
      }
    });
  });
  return scores;
}

function renderResults() {
  const scores = computeScores();
  const ranked = ARCHETYPE_ORDER
    .map(k => ({ k, score: scores[k] }))
    .sort((a, b) => b.score - a.score);
  const max = ranked[0].score || 1;
  const top = ranked[0];
  const second = ranked[1];
  const comboKey = [top.k, second.k].sort().join("+");
  const comboText = COMBOS[comboKey] || COMBOS[[second.k, top.k].sort().join("+")] || "";
  const dominantGap = top.score - second.score;
  const dominanceNote = dominantGap >= 5
    ? `${ARCHETYPES[top.k].name} is <strong>${dominantGap.toFixed(1)} points clear</strong> — that's a dominant primary. The others are flavor.`
    : `${ARCHETYPES[top.k].name} and ${ARCHETYPES[second.k].name} are close — treat both as primary.`;

  app.innerHTML = `
    <header>
      <h1>Your Gaming Brain Type</h1>
      <p>Top two archetypes tell you more than top one. Combo matters.</p>
    </header>

    <div class="card">
      <h2 style="margin-top:0">Scores</h2>
      <div class="scores">
        ${ranked.map((r, i) => `
          <div class="score-name ${i === 0 ? "top" : ""}">${ARCHETYPES[r.k].name}</div>
          <div class="score-bar-wrap">
            <div class="score-bar ${i === 0 ? "top" : ""}" style="width:${(r.score/max)*100}%"></div>
          </div>
          <div class="score-val">${r.score.toFixed(1)}</div>
        `).join("")}
      </div>
      <p style="color: var(--muted); font-size:.95rem">${dominanceNote}</p>

      <h2>Your combo: ${ARCHETYPES[top.k].name} + ${ARCHETYPES[second.k].name}</h2>
      ${comboText ? `<p><strong>${comboText}</strong></p>` : ""}

      <div class="archetype-block">
        <div class="archetype-tag">Primary</div>
        <div class="archetype-name">${ARCHETYPES[top.k].name}</div>
        <p>${ARCHETYPES[top.k].profile}</p>
        <p class="games"><strong>Try:</strong> ${ARCHETYPES[top.k].games.slice(0, 8).join(", ")}.</p>
        <p style="font-size:.9rem; color: var(--muted)"><strong>Bounces off:</strong> ${ARCHETYPES[top.k].antiPattern}</p>
      </div>

      <div class="archetype-block secondary">
        <div class="archetype-tag">Secondary</div>
        <div class="archetype-name">${ARCHETYPES[second.k].name}</div>
        <p>${ARCHETYPES[second.k].profile}</p>
        <p class="games"><strong>Try:</strong> ${ARCHETYPES[second.k].games.slice(0, 6).join(", ")}.</p>
      </div>

      <h3>Sweet-spot games (hit both archetypes)</h3>
      <p>${sweetSpotGames(top.k, second.k)}</p>

      <div class="footnote">
        This is a wiring quiz, not a destiny quiz. Mood matters. "Bounces off" means more friction — not don't try. The best gaming experiences sometimes come from a genre fighting your wiring just hard enough to teach you something new.
      </div>

      <div class="restart">
        <button id="restart">Take it again</button>
      </div>
    </div>
  `;

  app.querySelector("#restart").addEventListener("click", () => {
    answers = QUESTIONS.map(() => []);
    current = 0;
    showResults = false;
    window.scrollTo({ top: 0, behavior: "smooth" });
    render();
  });
}

function sweetSpotGames(a, b) {
  const overlaps = {
    "P+E": "Outer Wilds, Tunic, Return of the Obra Dinn",
    "P+Y": "Opus Magnum, Shenzhen I/O, Factorio (with mods)",
    "P+T": "Slay the Spire, Inscryption, Cobalt Core",
    "P+N": "Pentiment, The Case of the Golden Idol, Disco Elysium",
    "P+R": "Hades, Patrick's Parabox, Tetris Effect",
    "P+S": "Keep Talking and Nobody Explodes, We Were Here, Escape Simulator",
    "Y+E": "Valheim, Terraria, Minecraft, Subnautica",
    "Y+T": "Civilization VI, Stellaris, Crusader Kings III",
    "Y+R": "RimWorld + combat focus, Noita, Children of Morta",
    "Y+N": "RimWorld, Frostpunk, Dwarf Fortress (the stories)",
    "Y+S": "Final Fantasy XIV, V Rising, Valheim co-op",
    "T+E": "Battle Brothers, Wildermyth, Mount & Blade: Bannerlord",
    "T+R": "StarCraft II, Total War: Warhammer III, Street Fighter 6",
    "T+N": "Baldur's Gate 3, Fire Emblem: Three Houses, Pentiment",
    "T+S": "League of Legends, Dota 2, Among Us",
    "E+N": "Outer Wilds, Citizen Sleeper, Disco Elysium",
    "E+R": "Hollow Knight, Hades, Returnal, Elden Ring",
    "E+S": "Sea of Thieves, FFXIV, Deep Rock Galactic",
    "N+R": "Hades, NieR: Automata, Bayonetta",
    "N+S": "Baldur's Gate 3 co-op, It Takes Two, Sea of Thieves",
    "R+S": "Apex Legends, Helldivers 2, Overcooked 2"
  };
  const key1 = [a, b].sort().join("+");
  return overlaps[key1] || `${ARCHETYPES[a].games[0]}, ${ARCHETYPES[b].games[0]} — try one game from each archetype's list above.`;
}

function escape(s) {
  return s.replace(/[<>&"']/g, c => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;", "'":"&#39;" }[c]));
}

render();
</script>
</body>
</html>
